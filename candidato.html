  .prof-in{position:relative;z-index:2;display:grid;grid-template-columns:200px 1fr;gap:34px;align-items:center}
  .prof-photo img{width:200px;height:200px;object-fit:cover;border-radius:20px;border:2px solid rgba(242,169,0,.4)}
  .badge{display:inline-block;font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#1a1304;background:var(--amarelo);padding:6px 14px;border-radius:999px;margin-bottom:14px}
  .prof-info h1{font-size:clamp(28px,5vw,42px);font-weight:800;letter-spacing:-.02em;line-height:1.08;margin-bottom:8px}
  .prof-info .cargo{color:var(--amarelo);font-weight:700;font-size:17px}
  .prof-info .cidade{color:var(--cinza-claro);font-size:14.5px;margin-top:2px;display:flex;align-items:center;gap:7px}
  .prof-links{margin-top:18px;display:flex;gap:12px;flex-wrap:wrap}
  .prof-links a{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:14px;color:var(--amarelo);border:1.5px solid var(--amarelo);border-radius:10px;padding:9px 16px;transition:all .15s}
  .prof-links a:hover{background:var(--amarelo);color:#1a1304}
  .prof-body{padding:52px 0}
  .prof-body .sec-eyebrow{font-size:12.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--amarelo);margin-bottom:14px}
  .prof-body h2{font-size:24px;font-weight:800;margin-bottom:18px}
  .prof-body p{color:#d4d4d4;font-size:16.5px;margin-bottom:16px;max-width:68ch}
  .prof-resumo{font-size:18.5px;color:#fff;font-weight:600;line-height:1.5;max-width:68ch;
    padding:18px 22px;background:rgba(242,169,0,.08);border-left:3px solid var(--amarelo);border-radius:0 12px 12px 0;margin-bottom:30px}
  .traj{margin:34px 0 8px;padding:28px 26px;background:var(--preto-3);border:1px solid var(--linha);border-radius:18px;max-width:68ch}
  .traj h3{font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--amarelo);margin-bottom:16px}
  .traj ul{list-style:none;display:grid;gap:11px}
  .traj li{position:relative;padding-left:24px;color:#d4d4d4;font-size:15px;line-height:1.5}
  .traj li::before{content:"";position:absolute;left:0;top:8px;width:9px;height:9px;border-radius:2px;background:var(--amarelo)}
  .back-link{display:inline-flex;align-items:center;gap:8px;color:var(--amarelo);font-weight:700;font-size:14.5px;margin-top:10px}
  .cta-band{position:relative;overflow:hidden;border-top:1px solid var(--linha);background:linear-gradient(120deg,#1a1408,#0a0a0a 60%);padding:60px 0;text-align:center}
  .cta-band::after{content:"";position:absolute;inset:0;background:radial-gradient(40vw 40vw at 85% 30%,rgba(242,169,0,.18),transparent 60%);pointer-events:none}
  .cta-band .in{position:relative;z-index:2;max-width:600px;margin:0 auto}
  .cta-band p{color:#cfcfcf;margin:10px 0 24px;font-size:16px}
  .btn{display:inline-block;font-weight:800;font-size:15px;border-radius:12px;padding:14px 28px;background:linear-gradient(180deg,var(--amarelo-claro),var(--amarelo));color:#1a1304;box-shadow:0 10px 26px rgba(242,169,0,.28);transition:filter .15s}
  .btn:hover{filter:brightness(1.05)}
  footer{background:var(--preto-2);border-top:1px solid var(--linha);padding:38px 0;text-align:center;color:#6a6a6a;font-size:13px}
  footer a{color:var(--amarelo)}
  .notfound{text-align:center;padding:90px 22px}
  .notfound h1{font-size:30px;margin-bottom:12px}
  .notfound p{color:var(--cinza-claro);margin-bottom:24px}
  @media(max-width:680px){
    .prof-in{grid-template-columns:1fr;text-align:center;gap:22px}
    .prof-photo{max-width:200px;margin:0 auto}
    .prof-info .cidade{justify-content:center}
    .prof-links{justify-content:center}
  }
</style>
</head>

  function foto(c){ return c.foto && c.foto.trim() ? c.foto : AVATAR; }
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function render(){
    const id = getId();
    let c = (typeof CANDIDATOS!=='undefined') ? CANDIDATOS.find(x=>x.id===id) : null;
    // Se não houver ?id= na URL (ex.: preview), mostra o primeiro candidato por padrão.
    if(!c && !id && typeof CANDIDATOS!=='undefined' && CANDIDATOS.length){ c = CANDIDATOS[0]; }
    const el = document.getElementById('conteudo');

    if(!c){
      el.innerHTML = `<div class="notfound">
        <h1>Pré-candidato não encontrado</h1>
        <p>O perfil que você procura não existe ou ainda não foi publicado.</p>
        <a class="btn" href="candidatos.html">Ver todos os pré-candidatos</a>
      </div>`;
      return;
    }

    document.title = c.nome + ' — Missão Paraná';
    const metaDesc = document.querySelector('meta[name="description"]');
    if(metaDesc) metaDesc.setAttribute('content', (c.cargoLabel||'') + ' · ' + (c.bio||'').split('\n\n')[0]);

    const igBtn = (c.instagram && c.instagram!=='#')
      ? `<a href="${c.instagram}" target="_blank" rel="noopener">${IG_SVG} Instagram</a>` : '';
    const grupoBtn = `<a href="grupos.html">Apoiar a Missão</a>`;

    const parags = (c.bio||'').split('\n\n').map(p=>`<p>${esc(p)}</p>`).join('');
    const resumoHTML = c.resumo ? `<div class="prof-resumo">${esc(c.resumo)}</div>` : '';
    const trajHTML = (Array.isArray(c.trajetoria) && c.trajetoria.length)
      ? `<div class="traj"><h3>Trajetória</h3><ul>${c.trajetoria.map(t=>`<li>${esc(t)}</li>`).join('')}</ul></div>`
      : '';

    el.innerHTML = `
      <header class="prof-head wm-rosas"><div class="wrap prof-in">
        <div class="prof-photo"><img src="${foto(c)}" alt="Foto de ${esc(c.nome)}"></div>
        <div class="prof-info">
          <span class="badge">${esc(c.cargoLabel||'Pré-candidato')}</span>
          <h1>${esc(c.nome)}</h1>
          <div class="cargo">${esc(c.cargoLabel||'')}</div>
          <div class="cidade">${PIN_SVG} ${esc(c.cidade||'')}</div>
          <div class="prof-links">${igBtn}${grupoBtn}</div>
        </div>
      </div></header>

      <section class="prof-body"><div class="wrap">
        <div class="sec-eyebrow">Quem é</div>
        <h2>A história de ${esc(c.nome.split(' ').slice(0,2).join(' '))}.</h2>
        ${resumoHTML}
        ${parags}
        ${trajHTML}
        <a class="back-link" href="candidatos.html">← Ver todos os pré-candidatos</a>
      </div></section>

      <section class="cta-band"><div class="wrap in">
        <h2>Essa missão também é sua.</h2>
        <p>Entre no grupo da sua região e ajude a transformar o Paraná.</p>
        <a class="btn" href="grupos.html">Entrar no grupo da minha região</a>
      </div></section>
    `;
  }
  render();
</script>
