<style>

  nav{position:sticky;top:0;z-index:50;background:rgba(10,10,10,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--linha)}

  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}
  .brand img{height:34px}.brand .pr{color:var(--amarelo)}
  .nav-back{font-size:14px;color:#d8d8d8;display:flex;align-items:center;gap:7px;transition:color .15s}
  .nav-back:hover{color:var(--amarelo)}
  .prof-head{position:relative;overflow:hidden;border-bottom:1px solid var(--linha);padding:56px 0 44px}
  .prof-head::after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(46vw 46vw at 84% 8%,rgba(242,169,0,.16),transparent 60%)}
  .wm-rosas::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background-image:url('assets/img/img-e633cca8a1.png');background-size:240px;background-repeat:repeat;opacity:.04;
    -webkit-mask-image:linear-gradient(120deg,#000,transparent 70%);mask-image:linear-gradient(120deg,#000,transparent 70%);}
  .prof-in{position:relative;z-index:2;display:grid;grid-template-columns:200px 1fr;gap:34px;align-items:center}
  .prof-photo img{width:200px;height:200px;object-fit:cover;border-radius:20px;border:2px solid rgba(242,169,0,.4)}

  @media(max-width:860px){
    .nav-links{position:fixed;inset:70px 0 auto 0;background:rgba(10,10,10,.98);backdrop-filter:blur(12px);
      flex-direction:column;align-items:stretch;gap:0;padding:8px 0 16px;border-bottom:1px solid var(--linha);
      transform:translateY(-130%);transition:transform .28s ease;max-height:calc(100vh - 70px);overflow-y:auto}
    .nav-links.open{transform:translateY(0)}
    .nav-links a{padding:15px 22px;width:100%;border-bottom:1px solid var(--linha);font-size:16px}
    .nav-links .btn{margin:14px 22px;text-align:center;width:auto}
    .burger{display:flex}
  }

    .nav-in{height:62px}
    .nav-links{inset:62px 0 auto 0}
    .brand{font-size:16px}.brand img{height:30px}
  }
</style>

<script>
  const IG_SVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>';
  const YT_SVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="4"/><path d="M10 9.5v5l4.5-2.5Z" fill="currentColor" stroke="none"/></svg>';
  const FB_SVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3.6L18 12h-4v-2.5A1.5 1.5 0 0 1 15.5 8H18Z"/></svg>';
  const TT_SVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>';
  const PIN_SVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>';

  function getId(){
    return 'luiz-franca'; // página dedicada
  }
  const AVATAR = "assets/img/img-d2433fe371.png";
  function foto(c){ return c.foto && c.foto.trim() ? c.foto : AVATAR; }
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function render(){
    const id = getId();
    let c = (typeof CANDIDATOS!=='undefined') ? CANDIDATOS.find(x=>x.id===id) : null;
    // Se não houver ?id= na URL (ex.: preview), mostra o primeiro candidato por padrão.
    if(!c && !id && typeof CANDIDATOS!=='undefined' && CANDIDATOS.length){ c = CANDIDATOS[0]; }
    const el = document.getElementById('conteudo');

    if(!c){
      el.innerHTML = `<div class="notfound">
        <h1>Pré-candidato não encontrado</h1>
        <p>O perfil que você procura não existe ou ainda não foi publicado.</p>
        <a class="btn" href="candidatos.html">Ver todos os pré-candidatos</a>
      </div>`;
      return;
    }

    document.title = c.nome + ' — Missão Paraná';
    const metaDesc = document.querySelector('meta[name="description"]');
    if(metaDesc) metaDesc.setAttribute('content', (c.cargoLabel||'') + ' · ' + (c.bio||'').split('\n\n')[0]);

    const igBtn = (c.instagram && c.instagram!=='#')
      ? `<a href="${c.instagram}" target="_blank" rel="noopener">${IG_SVG} Instagram</a>` : '';
    const ytBtn = (c.youtube && c.youtube.trim())
      ? `<a href="${c.youtube}" target="_blank" rel="noopener">${YT_SVG} YouTube</a>` : '';
    const fbBtn = (c.facebook && c.facebook.trim())
      ? `<a href="${c.facebook}" target="_blank" rel="noopener">${FB_SVG} Facebook</a>` : '';
    const ttBtn = (c.tiktok && c.tiktok.trim())
      ? `<a href="${c.tiktok}" target="_blank" rel="noopener">${TT_SVG} TikTok</a>` : '';
    const grupoBtn = `<a href="grupos.html">Apoiar a Missão</a>`;
    const SHARE_SVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>';
    const shareBtn = `<button class="share-btn" id="shareBtn" type="button">${SHARE_SVG} Compartilhar</button>`;

    const parags = (c.bio||'').split('\n\n').map(p=>`<p>${esc(p)}</p>`).join('');
    const resumoHTML = c.resumo ? `<div class="prof-resumo">${esc(c.resumo)}</div>` : '';
    const trajHTML = (Array.isArray(c.trajetoria) && c.trajetoria.length)
      ? `<div class="traj"><h3>Trajetória</h3><ul>${c.trajetoria.map(t=>`<li>${esc(t)}</li>`).join('')}</ul></div>`
      : '';

    el.innerHTML = `
      <header class="prof-head wm-rosas"><div class="wrap prof-in">
        <div class="prof-photo"><img src="${foto(c)}" alt="Foto de ${esc(c.nome)}"></div>
        <div class="prof-info">
          <span class="badge">Pré-candidato</span>
          <h1>${esc(c.nome)}</h1>
          <div class="cargo">Pré-candidato a ${esc(c.cargoLabel||'')}</div>
          <div class="cidade">${PIN_SVG} ${esc(c.cidade||'')}</div>
          <div class="prof-links">${igBtn}${fbBtn}${ttBtn}${ytBtn}${grupoBtn}${shareBtn}</div>
        </div>
      </div></header>

      <section class="prof-body"><div class="wrap">
        <div class="sec-eyebrow">Quem é</div>
        <h2>A história de ${esc(c.nome.split(' ').slice(0,2).join(' '))}.</h2>
        ${resumoHTML}
        ${parags}
        ${trajHTML}
        <a class="back-link" href="candidatos.html">← Ver todos os pré-candidatos</a>
      </div></section>

      <section class="cta-band"><div class="wrap in">
        <h2>Essa missão também é sua.</h2>
        <p>Entre no grupo da sua região e ajude a transformar o Paraná.</p>
        <a class="btn" href="grupos.html">Entrar no grupo da minha região</a>
      </div></section>
    `;
  }
  render();
  const shareButton = document.getElementById('shareBtn');
  if(shareButton){
    shareButton.addEventListener('click', async function(){
      const url = window.location.href;
      if(navigator.share){
        try{ await navigator.share({ title: document.title, url: url }); }catch(e){}
      } else {
        try{
          await navigator.clipboard.writeText(url);
          const textoOriginal = shareButton.innerHTML;
          shareButton.innerHTML = 'Link copiado!';
          setTimeout(function(){ shareButton.innerHTML = textoOriginal; }, 2000);
        }catch(e){}
      }
    });
  }
</script>
<script>
(function(){
  var burger=document.getElementById('burger'),links=document.getElementById('navLinks');
  if(burger&&links){
    function toggle(){var o=links.classList.toggle('open');burger.classList.toggle('open',o);}
    burger.addEventListener('click',toggle);
    burger.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle();}});
    links.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){links.classList.remove('open');burger.classList.remove('open');});});
  }
})();
</script>
